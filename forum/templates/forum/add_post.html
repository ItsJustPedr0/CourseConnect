{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | CourseConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #333; 
        }
        .navbar {
            min-height: 100px; 
            display: flex;
            align-items: center;
        }
        .hero-section {
            background: linear-gradient(135deg, #004a99 0%, #007bff 100%); 
            color: white; 
            padding: 40px 0;
        }
        .create-card { 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            border-top: 5px solid #007bff;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }
        .anonymous-badge { 
            background-color: #6c757d; color: white; font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; 
        }
        .hidden-input {
            display: none;
            margin-top: 10px;
        }
        .btn-post {
            background-color: #007bff;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-post:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
		footer {
			flex-shrink: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand fw-bold fs-3" href="{% url 'home' %}">CourseConnect</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item px-2"><a class="nav-link fs-5" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item px-2"><a class="nav-link fs-5" href="{% url 'index' %}">Forum</a></li>
                    <li class="nav-item px-2"><a class="nav-link fs-5 active" href="{% url 'add_post' %}">Add Review</a></li>
                    <li class="nav-item px-2"><a class="nav-link fs-5" href="{% url 'repository' %}">Syllabi</a></li>
                    <li class="nav-item ms-lg-4">
                        <a class="btn btn-outline-light btn-lg px-4" href="#">Login (Anonymous)</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-n5 mb-5">
		<br><br>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card create-card p-4 p-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0">Create New Review</h4>
                        <span class="anonymous-badge">Posting Anonymously</span>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">Review Title</label>
                            <input type="text" name="title" class="form-control form-control-lg" placeholder="Title" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Department</label>
                            <select class="form-select" id="deptSelect" name="dept_id" required>
                                <option value="" selected disabled>Select a Department</option>
                                {% for dept in depts %}                                
                                <option value="{{ dept.id }}"> {{dept.name}} </option>
                                {% endfor %}
                            </select>
                        </div>
						
                        <div class="mb-4">
                            <label class="form-label">Professor</label>
                            <select class="form-select" id="profSelect" name="prof_id" onchange="toggleNewInput('profSelect', 'newProfInput')" required>
                                <option value="" selected disabled>Select a Professor</option>
                                {% for prof in profs %}                                
                                <option value="{{ prof.id }}"> {{prof.full_name}} </option>
                                {% endfor %}
                                <option value="NEW">-- Add New Professor --</option>
                            </select>
                            <input type="text" id="newProfFirstName" name="new_prof_first_name" class="form-control hidden-input mt-2" placeholder="Enter First Name">
                            <input type="text" id="newProfLastName" name="new_prof_last_name" class="form-control hidden-input mt-2" placeholder="Enter Last Name">
                        </div>
						
                        <div class="mb-4">
                            <label class="form-label">Course / Subject</label>
                            <select class="form-select" id="courseSelect" name="course_id" onchange="toggleNewInput('courseSelect', 'newCourseInput')" required>
                                <option value="" selected disabled>Select a Course</option>
                                {% for course in courses %}                                
                                <option value="{{ course.id }}"> {{course}} </option>
                                {% endfor %}
                                <option value="NEW">-- Add New Course --</option>
                            </select>
                            <input type="text" id="newCourseInput" name="new_course_name" class="form-control hidden-input" placeholder="Enter Course Code and Name (e.g. ENGG 101.01: Circuits 1)">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Your Review</label>
                            <textarea class="form-control" name="body" rows="6" placeholder="Body" required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-post btn-lg">Publish Review</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5">
        <div class="container text-center">
            <p class="mb-0">© CourseConnect. Built for Students.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // When dept changes, fetch profs
        document.getElementById('deptSelect').addEventListener('change', async function() {
            const deptId = this.value;
            const profSelect = document.getElementById('profSelect');
            const courseSelect = document.getElementById('courseSelect');

            // reset downstream dropdowns and hidden inputs
            profSelect.innerHTML = '<option value="" disabled>Loading...</option>';
            courseSelect.innerHTML = '<option value="" selected disabled>Select a Course</option>';
            document.getElementById('newProfFirstName').style.display = 'none';
            document.getElementById('newProfLastName').style.display = 'none';
            document.getElementById('newProfFirstName').removeAttribute('required');
            document.getElementById('newProfLastName').removeAttribute('required');
            document.getElementById('newCourseInput').style.display = 'none';
            document.getElementById('newCourseInput').removeAttribute('required');

            try {
                const response = await fetch(`/forum/get-profs/?dept_id=${deptId}`);
                const data = await response.json();

                profSelect.innerHTML = '<option value="" selected disabled>Select a Professor</option>';

                if (data.profs.length === 0) {
                    profSelect.innerHTML += '<option disabled>No professors found</option>';
                    return;
                }

                data.profs.forEach(prof => {
                    profSelect.innerHTML += `<option value="${prof.id}">${prof.first_name} ${prof.last_name}</option>`;
                });

                profSelect.innerHTML += '<option value="NEW">-- Add New Professor --</option>';

            } catch (error) {
                console.error('Error fetching profs:', error);
                profSelect.innerHTML = '<option disabled>Error loading professors</option>';
            }
        });

        // When prof changes, fetch courses
        document.getElementById('profSelect').addEventListener('change', async function() {
            const profId = this.value;
            const courseSelect = document.getElementById('courseSelect');

            // reset hidden inputs
            document.getElementById('newProfFirstName').style.display = 'none';
            document.getElementById('newProfLastName').style.display = 'none';
            document.getElementById('newProfFirstName').removeAttribute('required');
            document.getElementById('newProfLastName').removeAttribute('required');
            document.getElementById('newCourseInput').style.display = 'none';
            document.getElementById('newCourseInput').removeAttribute('required');

            if (profId === 'NEW') {
                document.getElementById('newProfFirstName').style.display = 'block';
                document.getElementById('newProfLastName').style.display = 'block';
                document.getElementById('newProfFirstName').setAttribute('required', 'true');
                document.getElementById('newProfLastName').setAttribute('required', 'true');
                document.getElementById('newProfFirstName').focus();

                // fetch courses by dept instead
                const deptId = document.getElementById('deptSelect').value;
                courseSelect.innerHTML = '<option value="" disabled>Loading...</option>';

                try {
                    const response = await fetch(`/forum/get-courses-by-dept/?dept_id=${deptId}`);
                    const data = await response.json();

                    courseSelect.innerHTML = '<option value="" selected disabled>Select a Course</option>';

                    if (data.courses.length === 0) {
                        courseSelect.innerHTML += '<option disabled>No courses found</option>';
                    } else {
                        data.courses.forEach(course => {
                            courseSelect.innerHTML += `<option value="${course.id}">${course.code}: ${course.name}</option>`;
                        });
                    }
                    courseSelect.innerHTML += '<option value="NEW">-- Add New Course --</option>';

                } catch (error) {
                    console.error('Error fetching courses:', error);
                    courseSelect.innerHTML = '<option disabled>Error loading courses</option>';
                }
                return;
            }

            // existing prof — fetch their courses
            courseSelect.innerHTML = '<option value="" disabled>Loading...</option>';
            try {
                const response = await fetch(`/forum/get-courses/?prof_id=${profId}`);
                const data = await response.json();
                courseSelect.innerHTML = '<option value="" selected disabled>Select a Course</option>';
                if (data.courses.length === 0) {
                    courseSelect.innerHTML += '<option disabled>No courses found</option>';
                    return;
                }
                data.courses.forEach(course => {
                    courseSelect.innerHTML += `<option value="${course.id}">${course.code}: ${course.name}</option>`;
                });
                courseSelect.innerHTML += '<option value="NEW">-- Add New Course --</option>';
            } catch (error) {
                console.error('Error fetching courses:', error);
                courseSelect.innerHTML = '<option disabled>Error loading courses</option>';
            }
        });

        // When course changes, check for NEW
        document.getElementById('courseSelect').addEventListener('change', function() {
            document.getElementById('newCourseInput').style.display = 'none';
            document.getElementById('newCourseInput').removeAttribute('required');

            if (this.value === 'NEW') {
                document.getElementById('newCourseInput').style.display = 'block';
                document.getElementById('newCourseInput').setAttribute('required', 'true');
                document.getElementById('newCourseInput').focus();
            }
        });
    </script>
</body>
</html>
